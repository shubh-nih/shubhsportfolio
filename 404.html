<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Shubham Bisht</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#4F8EF7;--accent2:#00D37F;--accent3:#A78BFA;--ease:cubic-bezier(.16,1,.3,1)}
body{font-family:'Inter',sans-serif;background:#080C12;color:#F0F4FF;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px;animation:fadeUp .9s var(--ease) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.code{
  font-family:'Anton',sans-serif;font-size:clamp(100px,20vw,180px);
  letter-spacing:4px;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 60px rgba(79,142,247,.25));
}
.title{font-family:'Anton',sans-serif;font-size:clamp(20px,4vw,32px);letter-spacing:2px;color:#F0F4FF;}
.sub{font-size:15px;color:#7A8599;max-width:340px;line-height:1.7;}
.home-btn{
  display:inline-flex;align-items:center;gap:9px;
  margin-top:8px;padding:13px 32px;border-radius:999px;
  background:var(--accent2);color:#fff;font-size:14px;font-weight:600;
  text-decoration:none;border:none;letter-spacing:.3px;
  box-shadow:0 4px 20px rgba(0,211,127,.25);
  transition:transform .2s var(--ease),box-shadow .2s,opacity .2s;
}
.home-btn:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,211,127,.4);opacity:.92;}
.glitch{position:relative;}
.glitch::before,.glitch::after{
  content:'404';position:absolute;top:0;left:0;right:0;
  font-family:'Anton',sans-serif;font-size:inherit;letter-spacing:4px;
  background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.glitch::before{animation:glitch1 3s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);}
.glitch::after{animation:glitch2 3s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);}
@keyframes glitch1{0%,95%,100%{transform:none;opacity:0}96%{transform:translate(-3px,1px);opacity:.6}97%{transform:translate(3px,-1px);opacity:.6}98%{transform:none;opacity:0}}
@keyframes glitch2{0%,95%,100%{transform:none;opacity:0}96%{transform:translate(3px,-1px);opacity:.5}97%{transform:translate(-3px,1px);opacity:.5}98%{transform:none;opacity:0}}
.dots{display:flex;gap:8px;margin-top:4px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.2s ease infinite;}
.dot:nth-child(2){background:var(--accent3);animation-delay:.2s;}
.dot:nth-child(3){background:var(--accent2);animation-delay:.4s;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="code glitch">404</div>
  <div class="title">PAGE NOT FOUND</div>
  <p class="sub">Looks like this page doesn't exist or was moved. Let's get you back on track.</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <a href="index.html" class="home-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Back to Portfolio
  </a>
</div>
</body>
</html>
